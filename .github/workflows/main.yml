name: Build AAB Neo Gridlock

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Install Cordova
        run: npm install -g cordova@latest

      - name: Create Project
        run: |
          cordova create build com.neogridlock.myapp "Neo Gridlock"
          cd build
          cordova platform add android@14.0.0
          
          cp ../index.html www/index.html
          cp -r ../assets www/assets || echo "Sem pasta assets"
          
          sed -i 's/version="1.0.0"/version="4.8.3"/' config.xml
          sed -i 's/android-versionCode="1"/android-versionCode="48003"/' config.xml
          
      - name: Configurar XML, Remover Robo e Liberar Vibração
        run: |
          cd build
          
          # ✅ CORRIGIDO: Usando # como separador e sintaxe correta
          sed -i 's#</widget>#    <icon src="res/icon/icon.png" />\n    <preference name="android-targetSdkVersion" value="35" />\n    <preference name="android-compileSdkVersion" value="35" />\n    <uses-permission android:name="android.permission.VIBRATE" />\n</widget>#' config.xml

          mkdir -p res/icon
          cp ../res/icon/icon.png res/icon/icon.png || echo "Sem logo"
          
          echo "=== PACKAGE ==="
          grep "id=" config.xml
          echo "==============="
          
          cordova prepare android
          
          THEMES="platforms/android/app/src/main/res/values/themes.xml"
          sed -i '/windowSplashScreenAnimatedIcon/d' $THEMES
          sed -i '/windowSplashScreenIconBackgroundColor/d' $THEMES
          sed -i 's#</style>#<item name="android:windowSplashScreenAnimatedIcon">@android:color/transparent</item><item name="android:windowSplashScreenBackground">@android:color/black</item></style>#' $THEMES
          
          echo "✅ ROBO REMOVIDO E VIBRAÇÃO LIBERADA"
          grep "windowSplashScreen" $THEMES
          grep "VIBRATE" config.xml

          mkdir -p platforms/android/app/src/main/res/mipmap-{mdpi,hdpi,xhdpi,xxhdpi,xxxhdpi}
          for dpi in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp res/icon/icon.png platforms/android/app/src/main/res/mipmap-$dpi/ic__launcher.png || true
          done

      - name: Build
        run: |
          cd build
          cordova build android --release -- --packageType=bundle

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: NeoGridlock-4.8.1-48001-sem-robo-com-vibracao
          path: build/platforms/android/app/build/outputs/bundle/release/*.aab
