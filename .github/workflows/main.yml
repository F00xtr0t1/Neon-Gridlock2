name: Build AAB
on:
  push:
    branches: [ main ]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Install Cordova
        run: npm install -g cordova@latest

      - name: Create Project
        run: |
          cordova create build com.neogridlock.myapp "Neon Gridlock"
          cd build
          # cordova-android@14 já vem com SDK 35 por padrão
          cordova platform add android@14.0.0
          cp -r ../* www/ || true
          rm -rf www/build
          
          # Atualiza versão do app no config.xml
          sed -i 's/version="1.0.0"/version="3.2.0"/' config.xml
          sed -i 's/android-versionCode="1"/android
