name: Build AAB Neo Gridlock

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Install Cordova
        run: npm install -g cordova@latest

      - name: Create Project
        run: |
          # PACKAGE SEM N: com.neogridlock.myapp
          cordova create build com.neogridlock.myapp "Neo Gridlock"
          cd build
          cordova platform add android@14.0.0
          
          # COPIA SÓ O NECESSÁRIO
          cp ../index.html www/index.html
          cp -r ../assets www/assets || echo "Sem pasta assets"
          
          # Atualiza versão 4.7.0
          sed -i 's/version="1.0.0"/version="4.7.0"/' config.xml
          sed -i 's/android-versionCode="1"/android-versionCode="47000"/' config.xml
          
      - name: Adicionar logo e SDK 35 + MATAR ROBO
        run: |
          cd build
          mkdir -p res/icon
          cp ../res/icon/icon.png res/icon/icon.png
          
          # CONFIRMA O PACKAGE NO LOG
          echo "=== PACKAGE QUE VAI PRO AAB ==="
          grep "id=" config.xml
          echo "=============================="
          
          sed
