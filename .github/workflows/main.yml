name: Build AAB Neon Gridlock

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Cordova
        run: npm install -g cordova@latest

      - name: Criar projeto Cordova
        run: |
          cordova create build com.neongridlock.myapp "Neon Gridlock"
          cd build
          cordova platform add android@14.0.0

      - name: Copiar arquivos do jogo
        run: |
          cd build
          cp -r ../index.html ./www/
          cp -r ../assets ./www/ 2>/dev/null || true
          cp -r ../README.md ./www/ || true

      - name: Adicionar logo e configurar app
        run: |
          cd build
          # Garante pasta da logo
          mkdir -p res/icon
          cp -r ../res/icon/icon.png ./res/icon/icon.png
          
          # Ajusta nome, versão e versionCode
          sed -i 's/<name>HelloCordova<\/name>/<name>Neon Gridlock<\/name>/' config.xml
          sed -i 's/version="1.0.0"/version="3.8.0"/' config.xml
          sed -i 's/android-versionCode="[0-9]*"/android-versionCode="30800"/' config.xml
          
          # Adiciona ícone no config.xml
          sed -i '/<\/widget>/i \    <icon src="res/icon/icon.png" />' config.xml
          
          # Força SDK 35 pra passar na Play Store
          sed -i '/<\/widget
