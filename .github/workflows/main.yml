name: Build AAB API 35 - Neon Gridlock Pro
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Cordova
        run: npm install -g cordova@12

      - name: Create Cordova Project
        run: |
          cordova create app com.f00xgames.neongridlockpro "Neon Gridlock Pro"
          rm -rf app/www/*

      - name: Copy Web Files
        run: |
          cp index.html app/www/index.html
          cp -r assets app/www/assets

      - name: Add Android Platform
        run: |
          cd app
          cordova platform add android@13

      - name: Force targetSdkVersion 35
        run: |
          cd app/platforms/android
          sed -i 's/targetSdkVersion=.*/targetSdkVersion=35/' project.properties
          sed -i 's/compileSdkVersion=.*/compileSdkVersion=35/' project.properties

      - name: Set versionCode and minSdk
        run: |
          cd app
          sed -i 's/android-versionCode="1"/android-versionCode="2"/' config.xml
          sed -i 's/<preference name="android-minSdkVersion" value=".*"/<preference name="android-minSdkVersion" value="24"/' config.xml || true
          sed -i 's/<preference name="android-targetSdkVersion" value=".*"/<preference name="android-targetSdkVersion" value="35"/' config.xml || true

      - name: Build Release AAB
        run: |
          cd app
          cordova build android --release -- --packageType=bundle

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeonGridlock-Pro-API35
          path: app/platforms/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 5
