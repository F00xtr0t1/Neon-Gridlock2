name: Build AAB Neo Gridlock

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Install Cordova
        run: npm install -g cordova@latest

      - name: Create Project
        run: |
          # PACKAGE SEM N: com.neogridlock.myapp
          cordova create build com.neogridlock.myapp "Neo Gridlock"
          cd build
          cordova platform add android@14.0.0
          
          # COPIA SÓ O NECESSÁRIO
          cp ../index.html www/index.html
          cp -r ../assets www/assets || echo "Sem pasta assets"
          
          # ATUALIZA VERSÃO PRA 3.8.2
          sed -i 's/version="1.0.0"/version="3.8.2"/' config.xml
          sed -i 's/android-versionCode="1"/android-versionCode="38200"/' config.xml
          
      - name: Adicionar logo
