name: Build AAB Neo Gridlock

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Install Cordova
        run: npm install -g cordova@latest

      - name: Create Project
        run: |
          cordova create build com.neogridlock.myapp "Neo Gridlock"
          cd build
          cordova platform add android@14.0.0
          
          cp ../index.html www/index.html
          cp -r ../assets www/assets || echo "Sem pasta assets"
          
          # VERSIONCODE MAIOR QUE 30900 PRA PASSAR NO PLAY CONSOLE
          sed -i 's/version="1.0.0"/version="4.8.1"/' config.xml
          sed -i 's/android-versionCode="1"/android-versionCode="48001"/' config.xml
          
      - name: Adicionar logo, SDK 35 e MATAR ROBO
        run: |
          cd build
          mkdir -p res/icon
          cp ../res/icon/icon.png res/icon/icon.png || echo "Sem logo"
          
          echo "=== PACKAGE QUE VAI PRO AAB ==="
          grep "id=" config.xml
          echo "=============================="
          
          sed -i 's#</widget>#    <icon src="res/icon/icon.png" />\n    <preference name="android-targetSdkVersion" value="35" />\n    <preference name="android-compileSdkVersion" value="35" /></widget>#' config.xml
          
          # CORREÇÃO: THEMES.XML NO LUGAR DE STYLES.XML
          cordova prepare android
          THEMES="platforms/android/app/src/main/res/values/themes.xml"
          sed -i 's#</style>#<item name="android:windowSplashScreenAnimatedIcon">@android:color/transparent</item><item name="android:windowSplashScreenBackground">@android:color/black</item><item name="android:windowSplashScreenIconBackgroundColor">@android:color/transparent</item></style>#' $THEMES
          
          echo "=== ROBO MORTO SE APARECER TRANSPARENT ==="
          grep "windowSplashScreen" $THEMES
          echo "=========================================="
          
          mkdir -p platforms/android/app/src/main/res/mipmap-mdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-hdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-xhdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-xxhdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-xxxhdpi
          cp res/icon/icon.png platforms/android/app/src/main/res/mipmap-mdpi/ic_launcher.png || true
          cp res/icon/icon.png platforms/android/app/src/main/res/mipmap-hdpi/ic_launcher.png || true
          cp res/icon/icon.png platforms/android/app/src/main/res/mipmap-xhdpi/ic_launcher.png || true
          cp res/icon/icon.png platforms/android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png || true
          cp res/icon/icon.png platforms/android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png || true

      - name: Build
        run: |
          cd build
          cordova build android --release -- --packageType=bundle

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: NeoGridlock-4.8.1-48001-sem-robo
          path: build/platforms/android/app/build/outputs/bundle/release/*.aab
