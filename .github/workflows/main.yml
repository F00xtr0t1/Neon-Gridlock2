name: Build Debug APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: npm install -g cordova@12
      - run: |
          cordova create app com.f00xgames.neongridlock "Neon Gridlock"
          rm -rf app/www/*
          cp index.html app/www/
          cp -r assets app/www/
      - run: cd app && cordova platform add android@13
      - run: cd app && cordova build android
      - uses: actions/upload-artifact@v4
        with:
          name: NeonGridlock-debug
          path: app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
