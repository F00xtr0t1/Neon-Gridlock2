name: Build AAB sem Robo

on: workflow_dispatch

jobs:
  android-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 20}
      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17'}
      - run: npm install -g cordova@latest

      - name: Criar projeto + Matar Robo
        run: |
          # O cordova create já gera o config.xml novo
          cordova create build com.neogridlock.myapp "Neo Gridlock"
          cd build
          cordova platform add android@14.0.0
          
          # Copia teu index.html
          cp ../index.html www/index.html
          cp -r ../assets www/assets || true
          
          # FORÇA VERSÃO 4.7.0 DIRETO NO CONFIG.XML GERADO
          sed -i 's/version="1.0.0"/version="4.7.0"/' config.xml
          sed -i 's/android-versionCode="1"/android-versionCode="47000"/' config.xml
          
          # MATA O ROBO DIRETO NO STYLES.XML DO ANDROID
          STYLES="platforms/android/app/src/main/res/values/styles.xml"
          sed -i 's#</style>#<item name="android:windowSplashScreenAnimatedIcon">@android:color/transparent</item><item name="android:windowSplashScreenBackground">@android:color/black</item></style>#' $STYLES
          
          echo "=== SE APARECER TRANSPARENT, ROBO MORREU ==="
          grep "windowSplashScreen" $STYLES
          echo "=========================================="
          
          cordova build android --release -- --packageType=bundle

      - uses: actions/upload-artifact@v4
        with:
          name: aab-sem-robo-4.7.0
          path: build/**/*.aab
