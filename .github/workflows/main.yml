name: Build AAB Neo Gridlock

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Install Cordova
        run: npm install -g cordova@latest

      - name: Create Project
        run: |
          # PACKAGE SEM N: com.neogridlock.myapp
          cordova create build com.neogridlock.myapp "Neo Gridlock"
          cd build
          cordova platform add android@14.0.0
          
          # COPIA SÓ O NECESSÁRIO
          cp ../index.html www/index.html
          cp -r ../assets www/assets || echo "Sem pasta assets"
          
          # Atualiza versão 4.5.0
          sed -i 's/version="1.0.0"/version="4.5.0"/' config.xml
          sed -i 's/android-versionCode="1"/android-versionCode="45000"/' config.xml
          
      - name: Adicionar logo e SDK 35 + MATAR ROBO
        run: |
          cd build
          mkdir -p res/icon
          cp ../res/icon/icon.png res/icon/icon.png
          
          # CONFIRMA O PACKAGE NO LOG
          echo "=== PACKAGE QUE VAI PRO AAB ==="
          grep "id=" config.xml
          echo "=============================="
          
          sed -i '/<\/widget>/i \    <icon src="res\/icon\/icon.png" \/>' config.xml
          sed -i '/<\/widget>/i \    <preference name="android-targetSdkVersion" value="35" \/>' config.xml
          sed -i '/<\/widget>/i \    <preference name="android-compileSdkVersion" value="35" \/>' config.xml
          sed -i '/<\/widget>/i \    <preference name="AndroidWindowSplashScreenAnimatedIcon" value="res\/icon\/icon.png" \/>' config.xml
          sed -i '/<\/widget>/i \    <preference name="AndroidWindowSplashScreenBackground" value="#000000" \/>' config.xml
          sed -i '/<\/widget>/i \    <preference name="SplashScreen" value="none" \/>' config.xml
          
          mkdir -p platforms/android/app/src/main/res/mipmap-mdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-hdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-xhdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-xxhdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-xxxhdpi
          cp res/icon
