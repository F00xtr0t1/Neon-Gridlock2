name: Build AAB Neon Gridlock Pro

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Install Cordova
        run: npm install -g cordova@latest

      - name: Create Project
        run: |
          cordova create build com.neogridlock.myapp "Neon Gridlock"
          cd build
          cordova platform add android@14.0.0
          
          if [ -f ../index.html ]; then
            cp ../index.html www/index.html
          else
            echo "ERRO: index.html nao encontrado na raiz"
            exit 1
          fi
          
          cp -r ../assets www/assets || echo "Sem pasta assets - ok"
          
          sed -i 's/version="1.0.0"/version="3.8.0"/' config.xml
          sed -i 's/android-versionCode="1"/android-versionCode="30801"/' config.xml

      - name: Remove splash plugin
        run: |
          cd build
          cordova plugin rm cordova-plugin-splashscreen || echo "Plugin nao instalado"
          
      - name: Configurar AAB API 35 sem robo
        run: |
          cd build
          
          if [ -f ../res/icon/icon.png ]; then
            mkdir -p res/icon
            cp ../res/icon/icon.png res/icon/icon.png
            
            mkdir -p platforms/android/app/src/main/res/mipmap-mdpi
            mkdir -p platforms/android/app/src/main/res/mipmap-hdpi
            mkdir -p platforms/android/app/src/main/res/mipmap-xhdpi
            mkdir -p platforms/android/app/src/main/res/mipmap-xxhdpi
            mkdir -p platforms/android/app/src/main/res/mipmap-xxxhdpi
            cp res/icon/icon.png platforms/android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            cp res/icon/icon.png platforms/android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            cp res/icon/icon.png platforms/android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            cp res/icon/icon.png platforms/android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            cp res/icon/icon.png platforms/android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          else
            echo "AVISO: icon.png nao encontrado. Build vai usar icone padrao."
          fi
          
          sed -i 's#</widget>#    <icon src="res/icon/icon.png" />\n    <preference name="android-targetSdkVersion" value="35" />\n    <preference name="android-compileSdkVersion" value="35" />\n    <preference name="SplashScreenDelay" value="0" />\n    <preference name="ShowSplashScreen" value="false" />\n    <preference name="SplashScreen" value="none" />\n    <preference name="backgroundColor" value="0xFF02111A" />\n</widget>#' config.xml

      - name: Build AAB
        run: |
          cd build
          cordova build android --release -- --packageType=bundle

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: NeonGridlock-Pro-30801-API35
          path: build/platforms/android/app/build/outputs/bundle/release/*.aab
