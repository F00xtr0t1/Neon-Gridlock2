name: Build AAB Neon Gridlock

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Cordova
        run: npm install -g cordova@latest

      - name: Criar projeto Cordova
        run: |
          cordova create build com.neongridlock.myapp "Neon Gridlock"
          cd build
          cordova platform add android@14.0.0

      - name: Copiar arquivos do jogo
        run: |
          cd build
          cp -r ../index.html ./www/
          cp -r ../assets ./www/ 2>/dev/null || true
          cp -r ../README.md ./www/ || true

      - name: Adicionar logo e configurar app
        run: |
          cd build
          mkdir -p res/icon
          cp -r ../res/icon/icon.png ./res/icon/icon.png
          
          # Usa # como separador no sed pra não brigar com /
          sed -i 's#<name>HelloCordova</name>#<name>Neon Gridlock</name>#' config.xml
          sed -i 's#version="1.0.0"#version="3.8.0"#' config.xml
          sed -i 's#android-versionCode="[0-9]*"#android-versionCode="30800"#' config.xml
          
          # Adiciona ícone e SDK 35
          sed -i 's#</widget>#    <icon src="res/icon/icon.png" />\n    <preference name="android-targetSdkVersion" value="35" />\n    <preference name="android-compileSdkVersion" value="35" />\n</widget>#' config.xml
          
          # Cria mipmap
          mkdir -p platforms/android/app/src/main/res/mipmap-mdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-hdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-xhdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-xxhdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-xxxhdpi
          cp res/icon/icon.png platforms/android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp res/icon/icon.png platforms/android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp res/icon/icon.png platforms/android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp res/icon/icon.png platforms/android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp res/icon/icon.png platforms/android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Build AAB Release
        run: |
          cd build
          cordova build android --release -- --packageType=bundle

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: NeonGridlock-30800
          path: build/platforms/android/app/build/outputs/bundle/release/*.aab
