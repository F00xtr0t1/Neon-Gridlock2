name: Build AAB Neo Gridlock

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Install Cordova
        run: npm install -g cordova@latest

      - name: Create Project
        run: |
          cordova create build com.neogridlock.myapp "Neo Gridlock"
          cd build
          cordova platform add android@14.0.0
          
          cp ../index.html www/index.html
          cp -r ../assets www/assets || echo "Sem pasta assets"
          
          sed -i 's/version="1.0.0"/version="4.1.0"/' config.xml
          sed -i 's/android-versionCode="1"/android-versionCode="30900"/' config.xml
          
      - name: Adicionar logo e MATAR SPLASH DO ANDROID 12+
        run: |
          cd build
          mkdir -p res/icon
          cp ../res/icon/icon.png res/icon/icon.png
          
          echo "=== PACKAGE QUE VAI PRO AAB ==="
          grep "id=" config.xml
          echo "=============================="
          
          # INSERE AS LINHAS UMA POR UMA PRA NÃO QUEBRAR O SED
          sed -i 's#</widget>#    <icon src="res/icon/icon.png" />\n</widget>#' config.xml
          sed -i 's#</widget>#    <preference name="android-targetSdkVersion" value="35" />\n</widget>#' config.xml
          sed -i 's#</widget>#    <preference name="android-compileSdkVersion" value="35" />\n</widget>#' config.xml
          sed -i 's#</widget>#    <preference name="AndroidWindowSplashScreenAnimatedIcon" value="res/icon/icon.png" />\n</widget>#' config.xml
          sed -i 's#</widget>#    <preference name="AndroidWindowSplashScreenBackground" value="#000000" />\n</widget>#' config.xml
          sed -i 's#</widget>#    <preference name="SplashScreen" value="none" />\n</widget>#' config.xml
          
          mkdir -p platforms/android/app/src/main/res/mipmap-mdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-hdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-xhdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-xxhdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-xxxhdpi
          cp res/icon/icon.png platforms/android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp res/icon/icon.png platforms/android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp res/icon/icon.png platforms/android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp res/icon/icon.png platforms/android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp res/icon/icon.png platforms/android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Build
        run: |
          cd build
          cordova build android --release -- --packageType=bundle

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: NeoGridlock-4.1.0-30900-SEM-ROBO
          path: build/platforms/android/app/build/outputs/bundle/release/*.aab
