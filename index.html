<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Gridlock - Assets Version</title>
    <style>
        body {
            background: #02111a;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        /* Estilo do Combo */
        #gameCanvas {
            border: 2px solid rgba(0, 255, 255, 0.2);
            transition: box-shadow 0.2s, border-color 0.2s;
            background: #000;
            margin-top: 20px;
        }

        .combo-active {
            border-color: #00ffff !important;
            box-shadow: 0 0 25px #00ffff, inset 0 0 10px #00ffff;
        }

        #ui {
            text-align: center;
            padding: 10px;
        }

        .stats {
            font-size: 20px;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }

        #pieces-container {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
        }

        .slot {
            width: 80px;
            height: 80px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="mode-text" style="color: #ffd700; font-size: 14px;">MODO SELECIONADO</div>
    <div class="stats">SCORE: <span id="score">0</span></div>
</div>

<canvas id="gameCanvas" width="320" height="320"></canvas>

<div id="pieces-container">
    <div id="slot0" class="slot"></div>
    <div id="slot1" class="slot"></div>
    <div id="slot2" class="slot"></div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const size = 40; // Tamanho do bloco 320 / 8

    // --- CARREGAMENTO DE ASSETS ---
    const imgBloco = new Image();
    imgBloco.src = 'assets/bloco.png'; 
    let assetsLoaded = false;
    imgBloco.onload = () => { assetsLoaded = true; };

    // --- VARIÁVEIS DE JOGO ---
    let grid = Array(8).fill().map(() => Array(8).fill(0));
    let score = 0;
    let comboCount = 0;
    let comboTimer = 0;
    const COMBO_MAX_TIME = 200; // Duração do brilho

    let pieces = [null, null, null];
    let dragIdx = -1;
    let mX = 0, mY = 0;

    // Formatos simples
    const shapes = [
        [[1, 1], [1, 1]], // Quadrado
        [[1, 1, 1]],      // Linha
        [[1, 1, 1], [0, 1, 0]], // T
        [[1, 0], [1, 0], [1, 1]] // L
    ];

    function init() {
        newSet();
        requestAnimationFrame(loop);
    }

    function newSet() {
        for (let i = 0; i < 3; i++) {
            pieces[i] = shapes[Math.floor(Math.random() * shapes.length)];
        }
        updateUI();
    }

    function drawBlock(context, x, y, w, h) {
        if (assetsLoaded) {
            context.drawImage(imgBloco, x, y, w, h);
        } else {
            // Fallback caso a imagem falhe
            context.fillStyle = "#00ffff";
            context.fillRect(x + 2, y + 2, w - 4, h - 4);
        }
    }

    function checkLines() {
        let linesFound = 0;
        let rowsToRemove = [];
        let colsToRemove = [];

        // Checar Linhas
        for (let r = 0; r < 8; r++) {
            if (grid[r].every(v => v !== 0)) rowsToRemove.push(r);
        }
        // Checar Colunas
        for (let c = 0; c < 8; c++) {
            let full = true;
            for (let r = 0; r < 8; r++) {
                if (grid[r][c] === 0) full = false;
            }
            if (full) colsToRemove.push(c);
        }

        linesFound = rowsToRemove.length + colsToRemove.length;

        if (linesFound > 0) {
            // LOGICA DE COMBO
            comboCount++;
            comboTimer = COMBO_MAX_TIME;
            canvas.classList.add('combo-active');

            // Remove blocos
            rowsToRemove.forEach(r => grid[r].fill(0));
            colsToRemove.forEach(c => {
                for (let r = 0; r < 8; r++) grid[r][c] = 0;
            });

            score += linesFound * 10 * comboCount;
        }
        
        updateUI();
    }

    function loop() {
        // Update Combo Timer
        if (comboTimer > 0) {
            comboTimer--;
        } else {
            comboCount = 0;
            canvas.classList.remove('combo-active');
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Desenhar Grid de fundo (opcional)
        ctx.strokeStyle = "rgba(0, 255, 255, 0.1)";
        for(let i=0; i<8; i++) {
            for(let j=0; j<8; j++) {
                ctx.strokeRect(i*size, j*size, size, size);
                if (grid[j][i]) {
                    drawBlock(ctx, i * size, j * size, size, size);
                }
            }
        }

        requestAnimationFrame(loop);
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        for (let i = 0; i < 3; i++) {
            const slot = document.getElementById('slot' + i);
            slot.innerHTML = '';
            if (pieces[i]) {
                const pCanvas = document.createElement('canvas');
                pCanvas.width = 60; pCanvas.height = 60;
                const pCtx = pCanvas.getContext('2d');
                pieces[i].forEach((row, rIdx) => {
                    row.forEach((v, cIdx) => {
                        if (v) drawBlock(pCtx, cIdx * 15, rIdx * 15, 14, 14);
                    });
                });
                slot.appendChild(pCanvas);
            }
        }
    }

    // --- CONTROLES TOUCH ---
    canvas.addEventListener('touchstart', (e) => {
        // Lógica de arrastar peça aqui...
    });

    init();

</script>
</body>
</html>
