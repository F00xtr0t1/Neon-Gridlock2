<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Gridlock - Pro Edition</title>
    <style>
        :root {
            --cyan-neon: #00ffff;
            --cyan-glow: rgba(0, 255, 255, 0.8);
            --bg-dark: #02111a;
            --glass-bg: rgba(0, 40, 60, 0.4);
            --text-main: #b0e0e6;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; overflow: hidden; touch-action: none;
            transition: background 1.5s ease-in-out;
        }

        #start-screen {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, #0a2a3a 0%, #02111a 70%);
            z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #start-bg-canvas {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            opacity: 0.3;
        }

        .main-logo {
            font-size: 42px; font-weight: 900; color: #fff;
            text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 0 10px #fff, 0 0 20px var(--cyan-neon), 0 0 30px var(--cyan-neon);
            animation: logo-pulse 2s infinite alternate;
            z-index: 10; margin-bottom: 40px; text-align: center;
        }

        @keyframes logo-pulse {
            from { text-shadow: 0 0 10px #fff, 0 0 20px var(--cyan-neon); opacity: 0.9; }
            to { text-shadow: 0 0 15px #fff, 0 0 30px var(--cyan-neon), 0 0 40px var(--cyan-neon); opacity: 1; }
        }

        .start-btn {
            background: transparent;
            color: var(--cyan-neon);
            border: 2px solid var(--cyan-neon);
            padding: 15px 50px; font-size: 20px; font-weight: bold;
            border-radius: 50px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            transition: all 0.3s ease;
            z-index: 10; outline: none;
        }

        .start-btn:disabled { opacity: 0.3; border-color: #555; color: #555; cursor: wait; }

        .start-btn:hover:not(:disabled) {
            background: var(--cyan-neon); color: #000;
            box-shadow: 0 0 30px var(--cyan-glow); transform: scale(1.05);
        }

        #ui-container { margin: 15px 10px; text-align: center; width: 90%; max-width: 340px; z-index: 10; display: none; }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
            color: rgba(176, 224, 230, 0.6); margin-bottom: 8px;
        }

        .icon-btn {
            background: rgba(0, 255, 255, 0.1); border: 1px solid rgba(0, 255, 255, 0.3);
            color: var(--cyan-neon); font-size: 20px; cursor: pointer;
